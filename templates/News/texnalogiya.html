{% extends "News/base.html" %}
{% load static %}

{% block title %} Texnalogiya xabarlari {% endblock title %}

{% block content %}

<style>
.news-list-container {
    max-width: 1100px;
    margin: 40px auto;
}

.news-card {
    background: white;
    border-radius: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    margin-bottom: 25px;
    padding: 20px;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.news-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

.news-row {
    display: flex;
    align-items: center;
    gap: 20px;
}

.news-image {
    width: 220px;
    height: 150px;
    object-fit: cover;
    border-radius: 14px;
}

.news-title {
    font-size: 1.3rem;
    font-weight: 600;
    color: #222;
}

.news-title a {
    text-decoration: none;
    color: inherit;
}

.news-title a:hover {
    color: #0d6efd;
}

/* Mobile */
@media (max-width: 768px) {
    .news-row {
        flex-direction: column;
        text-align: center;
    }

    .news-image {
        width: 100%;
        height: 200px;
    }
}
</style>

<div class="news-list-container">

{% for news in Texnalogiya_yangiliklar %}

    <a href="{% url 'news_detail_page' news.slug %}">
    <div class="news-card">
        <div class="news-row">

            <img src="{{ news.image.url }}" class="news-image">

            <div>
                <h2 class="news-title">
                    {{ news.title }}
                </h2>
            </div>

        </div>
    </div>
        </a>

{% endfor %}

</div>

{% endblock content %}
