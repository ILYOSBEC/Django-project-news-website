{% extends "News/base.html" %}
{% load static %}

{% block title %}
{{ news.title }}
{% endblock title %}

{% block content %}

<style>
.news-container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.news-title {
    text-align: center;
    font-size: 2.5rem;
    font-weight: bold;
    margin-bottom: 15px;
}

.news-meta {
    display: flex;
    justify-content: center;
    gap: 25px;
    font-size: 0.95rem;
    color: #666;
    margin-bottom: 25px;
}

.news-image {
    display: block;
    margin: 0 auto 30px;
    width: 100%;
    max-height: 450px;
    object-fit: cover;
    border-radius: 14px;
}

.news-body {
    font-size: 1.1rem;
    line-height: 1.9;
    color: #333;
}
</style>

<div class="news-container">

    <h1 class="news-title">{{ news.title }}</h1>

    <div class="news-meta">
        <span>📌 {{ news.category }}</span>
        <span>🕒 {{ news.published_time }}</span>
    </div>

    <img src="{{ news.image.url }}" class="news-image">

    <div class="news-body">
        {{ news.body | linebreaks }}
    </div>

</div>

{% endblock content %}
